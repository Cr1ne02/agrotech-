<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Корзина — АгроТеч</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="header"></div>
  <div class="container">
    <h2 class="section-title">Корзина</h2>
    <div id="cart-items"></div>
    <div id="cart-summary"></div>
    <div id="cart-alert" style="margin-top:16px"></div>
  </div>
  <div id="footer"></div>
  <script src="/js/main.js"></script>
  <script>
    document.getElementById('header').innerHTML = getHeader('cart');
    document.getElementById('footer').innerHTML = getFooter();

    async function loadCart() {
      try {
        const items = await api('/api/cart');
        if (!items.length) {
          document.getElementById('cart-items').innerHTML = '<p style="text-align:center;color:var(--gray-500);padding:40px">Корзина пуста. <a href="/catalog.html" style="color:var(--green-600)">Перейти в каталог</a></p>';
          document.getElementById('cart-summary').innerHTML = '';
          return;
        }
        document.getElementById('cart-items').innerHTML = items.map(item => {
          const days = Math.max(1, Math.ceil((new Date(item.end_date) - new Date(item.start_date)) / 86400000));
          const total = days * item.price_per_day;
          return `<div class="cart-item">
            <div class="cart-item-img" style="background-image:url('/images/${item.image}');background-size:cover;background-position:center"></div>
            <div class="cart-item-info">
              <h3>${item.name}</h3>
              <p>${formatDate(item.start_date)} — ${formatDate(item.end_date)} (${days} дн.)</p>
              <p style="color:var(--green-600);font-weight:600">${formatPrice(total)}</p>
            </div>
            <button class="btn btn-danger btn-sm" onclick="removeFromCart(${item.id})">Удалить</button>
          </div>`;
        }).join('');

        const grandTotal = items.reduce((sum, item) => {
          const days = Math.max(1, Math.ceil((new Date(item.end_date) - new Date(item.start_date)) / 86400000));
          return sum + days * item.price_per_day;
        }, 0);

        document.getElementById('cart-summary').innerHTML = `
          <div class="cart-summary">
            <div class="cart-total">Итого: ${formatPrice(grandTotal)}</div>
            <button class="btn btn-primary" onclick="checkout()">Оформить бронирование</button>
          </div>`;
      } catch { window.location.href = '/login.html'; }
    }

    async function removeFromCart(id) {
      await api(`/api/cart/${id}`, { method: 'DELETE' });
      loadCart();
    }

    async function checkout() {
      try {
        await api('/api/bookings', { method: 'POST' });
        showAlert(document.getElementById('cart-alert'), 'Бронирование оформлено! Перейдите в личный кабинет для отслеживания.', 'success');
        loadCart();
      } catch (e) { showAlert(document.getElementById('cart-alert'), e.message); }
    }

    loadCart();
  </script>
</body>
</html>
