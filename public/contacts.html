<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакты — АгроТеч</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="header"></div>

  <div class="container">
    <h2 class="section-title">Свяжитесь <span>с нами</span></h2>

    <div class="contacts-grid">
      <div class="contact-info">
        <div class="contact-item">
          <div class="contact-icon">📍</div>
          <div><h4>Адрес</h4><p>г. Москва, ул. Сельскохозяйственная, д. 15, офис 301</p></div>
        </div>
        <div class="contact-item">
          <div class="contact-icon">📞</div>
          <div><h4>Телефон</h4><p>+7 (495) 123-45-67<br>+7 (800) 555-35-35 (бесплатно по РФ)</p></div>
        </div>
        <div class="contact-item">
          <div class="contact-icon">✉️</div>
          <div><h4>Email</h4><p>info@agrotech.ru<br>support@agrotech.ru</p></div>
        </div>
        <div class="contact-item">
          <div class="contact-icon">🕐</div>
          <div><h4>Режим работы</h4><p>Пн-Пт: 8:00 — 20:00<br>Сб-Вс: 9:00 — 18:00</p></div>
        </div>
      </div>

      <div>
        <div class="form-card" style="max-width:100%">
          <h2 style="text-align:left;font-size:1.3rem">Напишите нам</h2>
          <div id="contact-alert"></div>
          <form onsubmit="return sendMessage(event)">
            <div class="form-group"><label>Имя</label><input type="text" id="c-name" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="c-email" required></div>
            <div class="form-group"><label>Сообщение</label><textarea id="c-message" rows="5" required></textarea></div>
            <button type="submit" class="form-btn">Отправить</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div id="footer"></div>
  <script src="/js/main.js"></script>
  <script>
    document.getElementById('header').innerHTML = getHeader('contacts');
    document.getElementById('footer').innerHTML = getFooter();

    function sendMessage(e) {
      e.preventDefault();
      showAlert(document.getElementById('contact-alert'), 'Сообщение отправлено! Мы свяжемся с вами в ближайшее время.', 'success');
      e.target.reset();
      return false;
    }
  </script>
</body>
</html>
