<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — АгроТеч</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="form-page">
    <div class="form-card">
      <a href="/" class="logo" style="justify-content:center;margin-bottom:20px;font-size:1.6rem;color:#166534">🌾 Агро<span style="color:#15803d">Теч</span></a>
      <h2>Вход в аккаунт</h2>
      <div id="alert"></div>
      <form onsubmit="return handleLogin(event)">
        <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
        <div class="form-group"><label>Пароль</label><input type="password" id="password" required></div>
        <button type="submit" class="form-btn">Войти</button>
      </form>
      <div class="form-link">Нет аккаунта? <a href="/register.html">Зарегистрироваться</a></div>
    </div>
  </div>
  <script src="/js/main.js"></script>
  <script>
    async function handleLogin(e) {
      e.preventDefault();
      try {
        const data = await api('/api/login', { method: 'POST', body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value }) });
        window.location.href = data.role === 'admin' ? '/admin.html' : '/profile.html';
      } catch (err) { showAlert(document.getElementById('alert'), err.message); }
      return false;
    }
  </script>
</body>
</html>
