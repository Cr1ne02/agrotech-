<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — АгроТеч</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="form-page">
    <div class="form-card">
      <a href="/" class="logo" style="justify-content:center;margin-bottom:20px;font-size:1.6rem;color:#166534">🌾 Агро<span style="color:#15803d">Теч</span></a>
      <h2>Регистрация</h2>
      <div id="alert"></div>
      <form onsubmit="return handleRegister(event)">
        <div class="form-group"><label>Имя</label><input type="text" id="name" required></div>
        <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
        <div class="form-group"><label>Телефон</label><input type="tel" id="phone"></div>
        <div class="form-group"><label>Пароль</label><input type="password" id="password" required minlength="6"></div>
        <button type="submit" class="form-btn">Зарегистрироваться</button>
      </form>
      <div class="form-link">Уже есть аккаунт? <a href="/login.html">Войти</a></div>
    </div>
  </div>
  <script src="/js/main.js"></script>
  <script>
    async function handleRegister(e) {
      e.preventDefault();
      try {
        await api('/api/register', { method: 'POST', body: JSON.stringify({
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          phone: document.getElementById('phone').value,
          password: document.getElementById('password').value
        })});
        window.location.href = '/profile.html';
      } catch (err) { showAlert(document.getElementById('alert'), err.message); }
      return false;
    }
  </script>
</body>
</html>
